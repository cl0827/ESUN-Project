# ===============================
# 1. 伺服器設定
# ===============================
# 預設啟動的 Port
server.port=8080

# ===============================
# 2. 資料庫連線設定 (MySQL)
# ===============================
# 連線到esun_social_media
spring.datasource.url=jdbc:mysql://localhost:3306/esun_social_media?useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
spring.datasource.username=root
# ↓↓↓ 請務必改成你的 MySQL 密碼 ↓↓↓
spring.datasource.password=wsxqaz50318
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 3. JPA / Hibernate 設定
# ===============================
spring.jpa.hibernate.ddl-auto=update
# 在終端機顯示底層執行的 SQL 語法，方便後續 Debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true